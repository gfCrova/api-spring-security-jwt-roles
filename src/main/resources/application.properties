spring.application.name=demo-gc

spring.datasource.url=jdbc:postgresql://localhost:5432/demo_gc_db
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Seguridad JWT
jwt.token.validity=18000
jwt.signing.key=${JWT_SIGNING_KEY:change-this-default-jwt-secret-key-to-a-long-random-value}
jwt.authorities.key=roles
jwt.token.prefix=Bearer
jwt.header.string=Authorization
app.security.allowed-origins=${APP_ALLOWED_ORIGINS:http://localhost:3000}
